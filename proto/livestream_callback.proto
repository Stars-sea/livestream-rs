syntax = "proto3";

option csharp_namespace = "LiveService.Protos";

package livestream;

// Callback service used by livestream-rs to notify external systems
// about stream and puller lifecycle events.
service LivestreamCallback {
  // Called when a stream starts successfully.
  rpc NotifyStreamStarted (NotifyStreamStartedRequest) returns (NotifyResponse);

  // Called when a stream stops, optionally with an error message.
  rpc NotifyStreamStopped (NotifyStreamStoppedRequest) returns (NotifyResponse);

  // Called when a stream is about to restart due to a recoverable error.
  rpc NotifyStreamRestarting (NotifyStreamRestartingRequest) returns (NotifyResponse);

  // Called when a puller worker starts.
  rpc NotifyPullerStarted (NotifyPullerStartedRequest) returns (NotifyResponse);

  // Called when a puller worker stops.
  rpc NotifyPullerStopped (NotifyPullerStoppedRequest) returns (NotifyResponse);
}

// Notification payload for stream started event.
message NotifyStreamStartedRequest {
  // Unique live stream identifier.
  string live_id = 1;
}

// Notification payload for stream stopped event.
message NotifyStreamStoppedRequest {
  // Unique live stream identifier.
  string live_id = 1;
  // Optional human-readable error message if the stream stopped unexpectedly.
  optional string error_message = 2;
}

// Notification payload for stream restarting event.
message NotifyStreamRestartingRequest {
  // Unique live stream identifier.
  string live_id = 1;
  // Human-readable reason for restart.
  string error_message = 2;
}

// Notification payload for puller started event.
message NotifyPullerStartedRequest {
  // Unique live stream identifier.
  string live_id = 1;
}

// Notification payload for puller stopped event.
message NotifyPullerStoppedRequest {
  // Unique live stream identifier.
  string live_id = 1;
}

// Empty acknowledgment response.
message NotifyResponse {
}
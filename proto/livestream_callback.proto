syntax = "proto3";

option csharp_namespace = "LiveService.Protos";

package livestream;

service LivestreamCallback {
  rpc NotifyStreamStarted (NotifyStartedRequest) returns (NotifyResponse);

  rpc NotifyStreamStopped (NotifyStoppedRequest) returns (NotifyResponse);
}

message NotifyStartedRequest {
  string live_id = 1;
}

message NotifyStoppedRequest {
  string live_id = 1;
  optional string error_message = 2;
}

message NotifyResponse {
}
syntax = "proto3";

option csharp_namespace = "LiveService.Protos";

package livestream;

// Livestream control plane for creating/stopping/querying stream sessions.
service Livestream {
  // Start an ingest stream session and return structured endpoint info.
  rpc StartIngestStream (StartIngestStreamRequest) returns (StreamInfoResponse);

  // Stop an active ingest stream session by live_id.
  rpc StopIngestStream (StopIngestStreamRequest) returns (StopIngestStreamResponse);

  // List all active live_ids currently managed by the service.
  rpc ListIngestStreams (ListIngestStreamsRequest) returns (ListIngestStreamsResponse);

  // Query endpoint info for an existing live_id.
  rpc GetIngestStreamInfo (GetIngestStreamInfoRequest) returns (StreamInfoResponse);
}

enum InputProtocol {
  INPUT_PROTOCOL_SRT = 0;
  INPUT_PROTOCOL_RTMP = 1;
}

// Request to start stream ingest.
message StartIngestStreamRequest {
  // Business stream identifier.
  string live_id = 1;
  // Optional for RTMP, required for SRT according to server-side validation.
  optional string passphrase = 2;
  // Ingest protocol expected by this stream.
  InputProtocol input_protocol = 3;
}

// Structured endpoint info for gateway-side URL composition.
//
// Example (SRT):
// {
//   "live_id": "live_1001",
//   "host": "ingest.example.com",
//   "port": 4001,
//   "pull_port": 1935,
//   "rtmp_appname": "lives",
//   "passphrase": "abc123def456",
//   "input_protocol": "INPUT_PROTOCOL_SRT"
// }
//
// Example (RTMP):
// {
//   "live_id": "live_1001",
//   "host": "ingest.example.com",
//   "port": 1936,
//   "pull_port": 1935,
//   "rtmp_appname": "lives",
//   "input_protocol": "INPUT_PROTOCOL_RTMP"
// }
message StreamInfoResponse {
  // Business stream identifier.
  string live_id = 1;
  // Host reported by ingest service for selected input protocol.
  string host = 2;
  // Port reported by ingest service for selected input protocol.
  uint32 port = 3;
  
  // RTMP pulling port (for publish)
  uint32 pull_port = 4;
  // RTMP app name (for ingest & publish)
  string rtmp_appname = 5;

  // SRT passphrase, present only when input_protocol is SRT.
  optional string passphrase = 6;

  // Protocol used for this stream endpoint.
  InputProtocol input_protocol = 7;
}

message StopIngestStreamRequest {
  string live_id = 1;
}

message StopIngestStreamResponse {
  bool is_success = 1;
}

message ListIngestStreamsRequest {
}

message ListIngestStreamsResponse {
  repeated string live_ids = 1;
}

message GetIngestStreamInfoRequest {
  string live_id = 1;
}

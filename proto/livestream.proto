syntax = "proto3";

option csharp_namespace = "LiveService.Protos";

package livestream;

// Livestream control plane for creating/stopping/querying stream sessions.
service Livestream {
  // Start an ingest stream session and return structured session descriptor.
  rpc StartLivestream (StartLivestreamRequest) returns (StartLivestreamResponse);

  // Stop an active ingest stream session by live_id.
  rpc StopLivestream (StopLivestreamRequest) returns (StopLivestreamResponse);

  // List all active ingest stream descriptors currently managed by the service.
  rpc ListLivestreams (ListLivestreamsRequest) returns (ListLivestreamsResponse);

  // Query stream descriptor for an existing live_id.
  rpc GetLivestreamInfo (GetLivestreamInfoRequest) returns (GetLivestreamInfoResponse);

  // Watch stream session lifecycle events for a given live_id.
  rpc WatchLivestream (WatchLivestreamRequest) returns (stream WatchLivestreamResponse);
}

enum InputProtocol {
  INPUT_PROTOCOL_SRT = 0;
  INPUT_PROTOCOL_RTMP = 1;
}

enum SessionStatus {
  SESSION_STATUS_PENDING = 0;
  SESSION_STATUS_CONNECTING = 1;
  SESSION_STATUS_CONNECTED = 2;
  SESSION_STATUS_DISCONNECTED = 3;
}

// Request to start stream ingest.
message StartLivestreamRequest {
  // Business stream identifier.
  string live_id = 1;
  // Optional for RTMP, required for SRT according to server-side validation.
  optional string passphrase = 2;
  // Ingest protocol expected by this stream.
  InputProtocol input_protocol = 3;
}

// All transport endpoints related to a stream.
message StreamEndpoints {
  // Endpoints used by publishers to send media into the service.
  IngestEndpoints ingest = 1;
  // Endpoints used by viewers or downstream services to consume media.
  PlaybackEndpoints playback = 2;
}

// Ingest-side endpoints.
message IngestEndpoints {
  optional RtmpIngestEndpoint rtmp = 1;
  optional SrtIngestEndpoint srt = 2;
}

// Playback-side endpoints.
message PlaybackEndpoints {
  optional RtmpPlaybackEndpoint rtmp = 1;
  optional HttpFlvPlaybackEndpoint http_flv = 2;
}

// RTMP ingest URI components, for example:
// rtmp://{hostname}:{port}/{app_name}/{stream_key}
message RtmpIngestEndpoint {
  uint32 port = 1;
  string app_name = 2;
  string stream_key = 3;
}

// SRT ingest URI components.
message SrtIngestEndpoint {
  uint32 port = 1;
  optional string passphrase = 2;
}

// RTMP playback URI components, for example:
// rtmp://{hostname}:{port}/{app_name}/{stream_name}
message RtmpPlaybackEndpoint {
  uint32 port = 1;
  string app_name = 2;
  string stream_name = 3;
}

// HTTP-FLV playback URI components, for example:
// http://{hostname}{path}
message HttpFlvPlaybackEndpoint {
  string path = 1;
}

// Structured ingest session descriptor.
message StreamDescriptor {
  // Business stream identifier.
  string live_id = 1;
  // Ingest protocol bound to this stream.
  InputProtocol input_protocol = 2;
  // Current lifecycle status of stream session.
  SessionStatus status = 3;
  // Transport endpoints for ingest and playback.
  StreamEndpoints endpoints = 4;
}

message StartLivestreamResponse {
  StreamDescriptor descriptor = 1;
}

message StopLivestreamRequest {
  string live_id = 1;
}

message StopLivestreamResponse {
  bool is_success = 1;
}

message ListLivestreamsRequest {
}

message ListLivestreamsResponse {
  repeated StreamDescriptor streams = 1;
}

message GetLivestreamInfoRequest {
  string live_id = 1;
}

message GetLivestreamInfoResponse {
  StreamDescriptor descriptor = 1;
}

message WatchLivestreamRequest {
  string live_id = 1;
}

message WatchLivestreamResponse {
  // Current lifecycle status for the watched stream.
  SessionStatus status = 1;
}

syntax = "proto3";

option csharp_namespace = "LiveService.Protos";

package livestream;

// Livestream control plane for creating/stopping/querying stream sessions.
service Livestream {
  // Start an ingest stream session and return structured session descriptor.
  rpc StartIngestStream (StartIngestStreamRequest) returns (StartIngestStreamResponse);

  // Stop an active ingest stream session by live_id.
  rpc StopIngestStream (StopIngestStreamRequest) returns (StopIngestStreamResponse);

  // List all active ingest stream descriptors currently managed by the service.
  rpc ListIngestStreams (ListIngestStreamsRequest) returns (ListIngestStreamsResponse);

  // Query stream descriptor for an existing live_id.
  rpc GetIngestStreamInfo (GetIngestStreamInfoRequest) returns (GetIngestStreamInfoResponse);
}

enum InputProtocol {
  INPUT_PROTOCOL_SRT = 0;
  INPUT_PROTOCOL_RTMP = 1;
}

enum SessionStatus {
  SESSION_STATUS_PENDING = 0;
  SESSION_STATUS_CONNECTING = 1;
  SESSION_STATUS_CONNECTED = 2;
  SESSION_STATUS_DISCONNECTED = 3;
}

// Request to start stream ingest.
message StartIngestStreamRequest {
  // Business stream identifier.
  string live_id = 1;
  // Optional for RTMP, required for SRT according to server-side validation.
  optional string passphrase = 2;
  // Ingest protocol expected by this stream.
  InputProtocol input_protocol = 3;
}

// Endpoint information used by gateway-side URL composition.
message StreamEndpoint {
  // Port reported by ingest service for selected input protocol.
  uint32 port = 2;
  // Unified RTMP pull/publish port.
  uint32 rtmp_port = 3;
  // Unified RTMP application name.
  string rtmp_appname = 4;
  // SRT passphrase, present only when input_protocol is SRT.
  optional string passphrase = 5;
}

// Structured ingest session descriptor.
message StreamDescriptor {
  // Business stream identifier.
  string live_id = 1;
  // Ingest protocol bound to this stream.
  InputProtocol input_protocol = 2;
  // Current lifecycle status of stream session.
  SessionStatus status = 3;
  // Endpoint information for ingest/pull URL composition.
  StreamEndpoint endpoint = 4;
}

message StartIngestStreamResponse {
  StreamDescriptor stream = 1;
}

message StopIngestStreamRequest {
  string live_id = 1;
}

message StopIngestStreamResponse {
  bool is_success = 1;
}

message ListIngestStreamsRequest {
}

message ListIngestStreamsResponse {
  repeated StreamDescriptor streams = 1;
}

message GetIngestStreamInfoRequest {
  string live_id = 1;
}

message GetIngestStreamInfoResponse {
  StreamDescriptor stream = 1;
}
